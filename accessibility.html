<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ParkEase - Search Parking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    label { display: block; margin-bottom: 5px; }
    #suggestions { border: 1px solid #ccc; max-width: 300px; }
    .suggestion { padding: 5px; cursor: pointer; }
    .suggestion:hover, .suggestion:focus { background: #f0f0f0; outline: 2px solid #0078d7; }
    #results p { margin: 5px 0; }
    button { margin-top: 10px; padding: 8px 12px; cursor: pointer; }
    #map { height: 400px; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>Search Parking</h1>
  <label for="location">Enter Location:</label>
  <input type="text" id="location" aria-autocomplete="list" aria-controls="suggestions" aria-expanded="false">
  <div id="suggestions" role="listbox"></div>
  <button id="searchBtn">Search</button>

  <div id="results" aria-live="polite"></div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const locations = ["Pune Station", "Shivaji Nagar", "Hinjewadi", "Kothrud"];
    const input = document.getElementById("location");
    const suggestions = document.getElementById("suggestions");

    input.addEventListener("input", () => {
      const query = input.value.toLowerCase();
      suggestions.innerHTML = "";
      input.setAttribute("aria-expanded", "true");
      if (query) {
        const matches = locations.filter(loc => loc.toLowerCase().includes(query));
        matches.forEach((match, index) => {
          const div = document.createElement("div");
          div.textContent = match;
          div.className = "suggestion";
          div.setAttribute("role", "option");
          div.setAttribute("tabindex", "0");
          div.onclick = () => { input.value = match; suggestions.innerHTML = ""; input.setAttribute("aria-expanded", "false"); };
          div.onkeydown = (e) => { if (e.key === "Enter") div.click(); };
          suggestions.appendChild(div);
        });
      }
    });

    const parkingData = {
      "Pune Station": [
        { name: "Lot A", slots: 5, coords: [18.529, 73.855] },
        { name: "Lot B", slots: 2, coords: [18.517, 73.870] }
      ],
      "Shivaji Nagar": [
        { name: "Lot C", slots: 10, coords: [18.530, 73.850] },
        { name: "Lot D", slots: 3, coords: [18.535, 73.845] }
      ]
    };

    const map = L.map('map').setView([18.5204, 73.8567], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    document.getElementById("searchBtn").addEventListener("click", () => {
      const location = input.value;
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";
      map.eachLayer(layer => { if (layer instanceof L.Marker) map.removeLayer(layer); });

      if (parkingData[location]) {
        parkingData[location].forEach(spot => {
          const p = document.createElement("p");
          p.textContent = `${spot.name} - Available slots: ${spot.slots}`;
          const btn = document.createElement("button");
          btn.textContent = "Book";
          btn.onclick = () => alert(`You booked ${spot.name}!`);
          p.appendChild(btn);
          resultsDiv.appendChild(p);

          L.marker(spot.coords).addTo(map)
            .bindPopup(`<b>${spot.name}</b><br>Slots: ${spot.slots}`);
        });
      } else {
        resultsDiv.textContent = "No parking data available.";
      }
    });
  </script>
</body>
</html>
